name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Capacitor
        run: npm install

      - name: Prepare web assets (www)
        run: |
          rm -rf www && mkdir -p www
          cp index.html manifest.webmanifest sw.js www/
          cp -r assets www/

      - name: Add Android platform
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: App icon (AAFED logo)
        run: npx @capacitor/assets generate --android --iconBackgroundColor "#0E3449" --splashBackgroundColor "#0E3449" || echo "assets skipped"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename
        run: cp android/app/build/outputs/apk/debug/app-debug.apk AAFED.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AAFED-apk
          path: AAFED.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk
          name: AAFED APK
          files: AAFED.apk
